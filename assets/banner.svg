<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="100%" height="200">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </linearGradient>
    <style>
      .title { font: bold 40px sans-serif; fill: white; text-anchor: middle; }
      .subtitle { font: 20px sans-serif; fill: #e0f7fa; text-anchor: middle; }
      .pulse { animation: pulse 2s infinite; }
      @keyframes pulse { 0% { r: 10; opacity: 1; } 100% { r: 30; opacity: 0; } }
    </style>
  </defs>
  <rect width="800" height="200" rx="15" fill="url(#grad)" />
  <circle cx="100" cy="100" r="10" fill="white" class="pulse" />
  <circle cx="700" cy="100" r="10" fill="white" class="pulse" style="animation-delay: 1s;" />
  <text x="400" y="90" class="title">Product Analytics Tools</text>
  <text x="400" y="130" class="subtitle">Event-Based ⚡ Behavior ⚡ Insights</text>
</svg>
